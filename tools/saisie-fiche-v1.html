<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none';">
<title>saisie Fiche - v1</title>

<link rel="stylesheet" href="fonts/local.css">

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>

<style>
:root{
  /* --- Surfaces (mode clair) --- */
  --paper:#FAFAF9;           /* fond page */
  --paper-raised:#FFFFFF;    /* surfaces (cartes, sidebar) */
  --paper-sunken:#F2F3F5;    /* hover subtil, fonds atténués */
  --paper-deep:#E5E7EB;      /* bordure forte */
  /* --- Encre --- */
  --ink:#0B1016;
  --ink-soft:#2A313B;
  --ink-muted:#4B5563;
  --ink-light:#6B7280;
  /* --- Filets --- */
  --rule:#D8DBE0;
  --rule-strong:#B9BFC7;
  /* --- Accents Marianne (primaire : actions) --- */
  --sapphire:#000091;
  --sapphire-bright:#6A6AF4;
  --sapphire-dim:#8D8DF7;
  --sapphire-tint:rgba(0,0,145,.08);
  /* --- Forêt (secondaire : texture) --- */
  --forest:#2D4A2B;
  --forest-light:#5C8A5A;
  /* --- Statuts / attribution (ladder rouge→ambre→moutarde→gris) --- */
  --oxblood:#C8372D;
  --ochre:#D97706;
  --moss:#CA8A04;
  --status-confirmed:#C8372D;
  --status-probable:#D97706;
  --status-possible:#CA8A04;
  --status-unattrib:#9CA3AF;
  /* --- Formes --- */
  --radius-sm:6px;
  --radius:8px;
  --radius-pill:9999px;
  --shadow-float:0 4px 12px rgba(15,20,25,.08);
  /* --- Typographie --- */
  --font-display:'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-ui:'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, 'SFMono-Regular', monospace;
}
:root[data-theme="dark"]{
  --paper:#0F1419;
  --paper-raised:#1A2028;
  --paper-sunken:#232A33;
  --paper-deep:#3B4452;
  --ink:#F4F5F7;
  --ink-soft:#C8CDD4;
  --ink-muted:#8B93A0;
  --ink-light:#5A6271;
  --rule:#2A323D;
  --rule-strong:#3B4452;
  --sapphire:#6A6AF4;
  --sapphire-bright:#8D8DF7;
  --sapphire-dim:#A8A8FA;
  --sapphire-tint:rgba(106,106,244,.14);
  --forest:#5C8A5A;
  --forest-light:#7BA879;
  --oxblood:#E05048;
  --ochre:#F59E0B;
  --moss:#EAB308;
  --status-confirmed:#E05048;
  --status-probable:#F59E0B;
  --status-possible:#EAB308;
  --status-unattrib:#6B7280;
  --shadow-float:0 4px 12px rgba(0,0,0,.4);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --paper:#0F1419;
    --paper-raised:#1A2028;
    --paper-sunken:#232A33;
    --paper-deep:#3B4452;
    --ink:#F4F5F7;
    --ink-soft:#C8CDD4;
    --ink-muted:#8B93A0;
    --ink-light:#5A6271;
    --rule:#2A323D;
    --rule-strong:#3B4452;
    --sapphire:#6A6AF4;
    --sapphire-bright:#8D8DF7;
    --sapphire-dim:#A8A8FA;
    --sapphire-tint:rgba(106,106,244,.14);
    --forest:#5C8A5A;
    --forest-light:#7BA879;
    --oxblood:#E05048;
    --ochre:#F59E0B;
    --moss:#EAB308;
    --status-confirmed:#E05048;
    --status-probable:#F59E0B;
    --status-possible:#EAB308;
    --status-unattrib:#6B7280;
    --shadow-float:0 4px 12px rgba(0,0,0,.4);
  }
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv05"}
/* body background now uniform (v0 paper-dot pattern removed in v1) */
a{color:inherit}
button{font-family:inherit}
input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:5px;border:2px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:var(--rule-strong)}
::selection{background:var(--ink);color:var(--paper)}

.skip-link{position:absolute;top:-40px;left:8px;z-index:100;padding:8px 14px;background:var(--sapphire);color:#fff;border-radius:var(--radius);font-family:var(--font-ui);font-size:13px;font-weight:500;text-decoration:none;transition:top .12s}
.skip-link:focus{top:8px;outline:none;box-shadow:0 0 0 2px var(--sapphire-tint)}

.app{display:grid;grid-template-columns:276px 1fr;min-height:100vh}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--rule)}}

/* -------- Sidebar -------- */
.sidebar{position:sticky;top:0;height:100vh;border-right:1px solid var(--rule);background:var(--paper-raised);padding:32px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sidebar-brand{font-family:var(--font-ui);font-weight:600;font-size:22px;line-height:1;letter-spacing:-0.01em;color:var(--ink);margin:0 0 4px}
.sidebar-brand em{font-style:normal;font-weight:400;color:var(--ink-muted);font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;margin-left:6px}
.sidebar-sub{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light)}

.s-section{margin-top:32px}
.s-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-light);margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center}
.s-label-right{color:var(--ink-muted);letter-spacing:0.1em}

.nav-item{display:flex;align-items:baseline;gap:12px;padding:8px 10px;cursor:pointer;color:var(--ink-soft);font-size:13px;transition:color .12s,background .12s;border:0;background:none;width:100%;text-align:left;font-family:inherit;border-radius:var(--radius-sm);position:relative}
.nav-item:hover{color:var(--ink);background:var(--paper-sunken)}
.nav-item.active{color:var(--sapphire);background:var(--sapphire-tint)}
.nav-item.active::before{content:'';position:absolute;left:-24px;top:4px;bottom:4px;width:2px;background:var(--forest);border-radius:1px}
.nav-num{font-family:var(--font-mono);font-size:10px;color:var(--ink-light);min-width:28px;letter-spacing:0.02em;font-weight:500}
.nav-item.active .nav-num{color:var(--sapphire)}
.nav-label{flex:1;font-weight:400}
.nav-count{font-family:var(--font-mono);font-size:10px;color:var(--ink-light);background:var(--paper-sunken);padding:2px 7px;border-radius:var(--radius-pill)}
.nav-item.active .nav-count{color:var(--sapphire);background:var(--sapphire-tint)}

/* completeness */
.completeness-block{margin-top:14px}
.completeness-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.completeness-val{font-family:var(--font-mono);font-size:28px;font-weight:500;color:var(--ink);letter-spacing:-0.02em;line-height:1}
.completeness-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-light)}
.completeness-bar{height:3px;background:var(--paper-sunken);border-radius:2px;overflow:hidden}
.completeness-fill{height:100%;background:linear-gradient(90deg,var(--forest),var(--sapphire));transition:width .3s ease;border-radius:2px}
.completeness-meta{font-family:var(--font-mono);font-size:9px;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px;display:flex;justify-content:space-between}

.theme-toggle{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--rule);background:transparent;color:var(--ink-muted);cursor:pointer;border-radius:var(--radius);font-family:var(--font-ui);font-size:12px;font-weight:500;transition:background .12s,color .12s,border-color .12s}
.theme-toggle:hover{background:var(--paper-sunken);color:var(--ink);border-color:var(--rule-strong)}
.theme-toggle:focus-visible{outline:none;box-shadow:0 0 0 2px var(--sapphire-tint);border-color:var(--sapphire)}
.theme-toggle svg{flex-shrink:0}
.theme-toggle-label{flex:1;text-align:left}

/* -------- Main -------- */
.main{padding:40px 56px 120px;max-width:1040px}
@media(max-width:900px){.main{padding:28px 24px 80px}}

/* masthead */
.masthead{padding-bottom:24px;border-bottom:1px solid var(--rule);margin-bottom:36px;position:relative}
.masthead-line1{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:18px}
.masthead-line1 span{color:var(--ink)}
.masthead-title{font-family:var(--font-ui);font-weight:600;font-size:28px;line-height:1.15;letter-spacing:-0.015em;color:var(--ink);margin:0}
.masthead-title.ph{color:var(--ink-light);font-weight:400}
.masthead-info{display:flex;gap:32px;margin-top:22px;font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);flex-wrap:wrap}
.masthead-info-item{display:flex;gap:8px;align-items:baseline}
.masthead-info-item em{font-style:normal;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.1em;font-size:9px}
.masthead-info-item strong{font-weight:500;color:var(--ink)}

/* toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:36px;flex-wrap:wrap}
.toolbar-group{display:flex;gap:2px;border:1px solid var(--rule);border-radius:2px;background:var(--paper-raised);padding:2px}
.toolbar-btn{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;padding:7px 12px;border:0;background:transparent;color:var(--ink-muted);cursor:pointer;border-radius:1px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.toolbar-btn:hover{color:var(--ink);background:var(--paper-sunken)}
.toolbar-btn.active{color:var(--paper);background:var(--ink)}
.toolbar-btn svg{width:13px;height:13px;stroke-width:1.5;fill:none;stroke:currentColor}
.toolbar-spacer{flex:1}

/* section */
.section{margin-bottom:64px;scroll-margin-top:24px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:20px}
.section-title-wrap{display:flex;align-items:baseline;gap:16px;flex:1}
.section-num{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;color:var(--ink-light);text-transform:uppercase;font-weight:500}
.section-title{font-family:var(--font-ui);font-weight:600;font-size:22px;line-height:1.2;color:var(--ink);margin:0;letter-spacing:-0.015em}
.section-desc{color:var(--ink-muted);font-size:13px;margin:10px 0 24px;max-width:62ch;padding-bottom:20px;border-bottom:1px solid var(--rule);line-height:1.6}
.section-desc em{font-style:normal;color:var(--ink-soft);font-weight:500}

/* sub-rule */
.rule-strip{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted);display:flex;align-items:center;gap:14px;margin:32px 0 16px}
.rule-strip::before,.rule-strip::after{content:'';flex:1;height:1px;background:var(--rule)}
.rule-strip::before{flex:0 0 24px}

/* fields */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;position:relative}
.field-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);font-weight:500}
.field-label.req::after{content:'*';color:var(--status-confirmed);margin-left:4px}
.field-input,.field-select,.field-textarea{font-family:var(--font-ui);font-size:14px;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);padding:10px 12px;transition:border-color .12s,box-shadow .12s;width:100%;outline:none;appearance:none}
.field-select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%236B7280' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;background-size:12px 8px;padding-right:32px}
.field-input:hover,.field-select:hover,.field-textarea:hover{border-color:var(--rule-strong)}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--sapphire);box-shadow:0 0 0 2px var(--sapphire-tint)}
.field-input::placeholder,.field-textarea::placeholder{color:var(--ink-light);font-style:normal}
.field-input.mono{font-family:var(--font-mono);font-size:13px;letter-spacing:0}
.field-textarea{resize:vertical;min-height:72px;line-height:1.55}
.field-date{font-family:var(--font-mono);font-size:13px}

.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media(max-width:740px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* entry card */
.entry{border:1px solid var(--rule);background:var(--paper-raised);padding:22px 26px;margin-bottom:14px;position:relative;border-radius:2px;transition:border-color .15s}
.entry:hover{border-color:var(--rule-strong)}
.entry-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:12px;border-bottom:1px dashed var(--rule)}
.entry-idx{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted)}
.entry-idx strong{color:var(--ink);font-weight:500}

/* inline row entry (compact) */
.entry-compact{border:1px solid var(--rule);background:var(--paper-raised);padding:14px 16px;margin-bottom:10px;border-radius:2px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.entry-compact .field{margin:0;flex:1;min-width:180px}

/* buttons */
.btn{font-family:var(--font-ui);font-size:13px;font-weight:500;letter-spacing:0;padding:8px 14px;border:1px solid var(--rule-strong);background:var(--paper-raised);color:var(--ink);cursor:pointer;border-radius:var(--radius);transition:background .12s,border-color .12s,color .12s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:var(--paper-sunken);border-color:var(--ink-muted)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 2px var(--sapphire-tint);border-color:var(--sapphire)}
.btn:active{transform:translateY(1px)}
.btn svg{width:14px;height:14px;stroke-width:1.8;fill:none;stroke:currentColor}
.btn-primary{background:var(--sapphire);border-color:var(--sapphire);color:#FFFFFF}
.btn-primary:hover{background:var(--sapphire-bright);border-color:var(--sapphire-bright);color:#FFFFFF}
.btn-primary:focus-visible{box-shadow:0 0 0 2px var(--sapphire-tint)}
.btn-ghost{border-color:transparent;background:transparent;color:var(--ink-muted)}
.btn-ghost:hover{background:var(--paper-sunken);color:var(--ink);border-color:transparent}
.btn-danger{background:var(--status-confirmed);border-color:var(--status-confirmed);color:#FFFFFF}
.btn-danger:hover{filter:brightness(0.92)}
.btn-small{padding:5px 10px;font-size:11px;gap:6px}

.icon-btn{padding:7px;background:transparent;border:1px solid var(--rule);color:var(--ink-muted);cursor:pointer;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{color:var(--ink);background:var(--paper-sunken);border-color:var(--rule-strong)}
.icon-btn svg{width:14px;height:14px;stroke-width:1.5;fill:none;stroke:currentColor}
.icon-btn.danger:hover{color:var(--oxblood);border-color:var(--oxblood);background:rgba(139,46,46,.06)}

.remove-btn{border:0;background:transparent;color:var(--ink-light);cursor:pointer;padding:6px;transition:color .15s;border-radius:2px}
.remove-btn:hover{color:var(--oxblood)}
.remove-btn svg{width:14px;height:14px;stroke-width:1.5;fill:none;stroke:currentColor}

/* chips */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 12px;border:1px solid var(--rule-strong);font-family:var(--font-ui);font-size:11px;font-weight:500;color:var(--ink);background:var(--paper-raised);border-radius:var(--radius-pill);transition:background .12s,border-color .12s}
.chip:hover{background:var(--paper-sunken)}
.chip code,.chip .chip-id{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:0}
.chip-x{cursor:pointer;color:var(--ink-light);border:0;background:none;padding:0;font-size:14px;line-height:1;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-pill)}
.chip-x:hover{color:var(--status-confirmed)}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip.chip-filled{border:0;padding:3px 10px}
.chip.chip-filled.confirmed{background:var(--status-confirmed);color:#FFFFFF}
.chip.chip-filled.probable{background:var(--status-probable);color:#FFFFFF}
.chip.chip-filled.possible{background:var(--status-possible);color:#0F1419}
.chip.chip-filled.unattrib{background:var(--status-unattrib);color:#FFFFFF}

/* checks */
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;color:var(--ink-soft);font-size:13px;user-select:none}
.check-row:hover{color:var(--ink)}
.check-box{appearance:none;width:15px;height:15px;border:1.5px solid var(--rule-strong);border-radius:1px;margin:0;cursor:pointer;background:var(--paper-raised);position:relative;transition:all .15s;flex-shrink:0}
.check-box:checked{background:var(--ink);border-color:var(--ink)}
.check-box:checked::after{content:'';position:absolute;left:3px;top:0px;width:4px;height:9px;border:solid var(--paper);border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}
.check-box:focus-visible{box-shadow:0 0 0 3px rgba(29,53,87,.2);outline:none}

.checks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0 16px}

/* levier cards */
.levier{border:1px solid var(--rule);background:var(--paper-raised);padding:12px 14px;border-radius:2px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.levier:hover{border-color:var(--rule-strong);background:var(--paper-sunken)}
.levier.selected{border-color:var(--sapphire);background:var(--sapphire-tint);box-shadow:inset 3px 0 0 var(--sapphire)}
.levier-name{font-size:13px;color:var(--ink)}

/* autocomplete */
.ac-wrap{position:relative}
.ac{position:absolute;z-index:50;left:0;right:0;top:calc(100% + 4px);background:var(--paper-raised);border:1px solid var(--rule);max-height:320px;overflow-y:auto;box-shadow:var(--shadow-float);border-radius:var(--radius)}
.ac-item{padding:10px 14px;border-bottom:1px solid var(--rule);cursor:pointer;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:baseline;transition:background .1s;position:relative}
.ac-item:last-child{border-bottom:0}
.ac-item:hover,.ac-item[aria-selected="true"]{background:var(--sapphire-tint)}
.ac-item[aria-selected="true"]::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--sapphire);border-radius:1px}
.ac-code{font-family:var(--font-mono);font-size:11px;color:var(--sapphire);font-weight:500;white-space:nowrap;min-width:56px}
.ac-name{font-size:13px;color:var(--ink);line-height:1.3}
.ac-tactic{grid-column:2;font-size:11px;color:var(--ink-light);font-family:var(--font-ui);font-weight:400;margin-top:2px}

/* Diamond model view */
.diamond-view{display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start}
@media(max-width:900px){.diamond-view{grid-template-columns:1fr}}
.diamond-canvas{background:var(--paper-raised);border:1px solid var(--rule);overflow:hidden;border-radius:var(--radius);position:relative}
.diamond-canvas svg{display:block;width:100%;height:auto;max-height:720px}
.diamond-detail{background:var(--paper-raised);border:1px solid var(--rule);padding:24px;border-radius:var(--radius);position:sticky;top:24px}
.diamond-detail-title{font-family:var(--font-ui);font-weight:600;font-size:18px;margin:0 0 14px;color:var(--ink);letter-spacing:-0.01em}
.diamond-detail-row{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:8px 0;border-bottom:1px solid var(--rule);font-size:12px}
.diamond-detail-row:last-child{border-bottom:0}
.diamond-detail-row em{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-light);font-style:normal;padding-top:2px}
.diamond-detail-row span{color:var(--ink);word-break:break-word}
.diamond-detail-raw{margin-top:14px;padding-top:14px;border-top:1px solid var(--rule);font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);max-height:180px;overflow:auto;white-space:pre-wrap;background:var(--paper-sunken);padding:12px;border-radius:var(--radius-sm);line-height:1.5}

const Modal = ({ open, onClose, title, eyebrow, small, children }) => {
  useEffect(() => {
    if(!open) return;
    const onKey = e => { if(e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = prev; };
  }, [open, onClose]);
  if(!open) return null;
  return h('div', { className:'modal-backdrop', onClick: onClose, role:'dialog', 'aria-modal':'true' },
    h('div', { className:'modal-container'+(small?' small':''), onClick: e => e.stopPropagation() },
      h('button', { className:'modal-close', onClick: onClose, 'aria-label':'Fermer' }, h(X)),
      h('div', { className:'modal-header' },
        eyebrow && h('div', { className:'modal-eyebrow' }, eyebrow),
        h('h2', { className:'modal-title' }, title)
      ),
      h('div', { className:'modal-body' }, children)
    )
  );
};

const ImportZone = ({ onFile, accept='.json', hint='JSON uniquement • max 10 Mo' }) => {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef(null);
  const pick = () => inputRef.current && inputRef.current.click();
  const handle = files => { if(files && files[0]) onFile(files[0]); };
  return h('div', {
      className:'import-zone'+(drag?' drop-active':''),
      onClick: pick,
      onDragOver: e => { e.preventDefault(); setDrag(true); },
      onDragLeave: () => setDrag(false),
      onDrop: e => { e.preventDefault(); setDrag(false); handle(e.dataTransfer.files); },
      role:'button', tabIndex:0,
      onKeyDown: e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); pick(); } }
    },
    h(Upload),
    h('div', { className:'import-zone-title' }, drag ? 'Déposer pour importer' : 'Déposer un fichier ou cliquer'),
    h('div', { className:'import-zone-hint' }, hint),
    h('input', { ref:inputRef, type:'file', accept, onChange: e => { handle(e.target.files); e.target.value=''; } })
  );
};

const ConfirmToast = ({ message, confirmLabel, cancelLabel='Annuler', variant='primary', onConfirm, onCancel }) => {
  const label = confirmLabel || (onCancel ? 'Confirmer' : 'Fermer');
  return h('div', { className:'confirm-toast', role:'alertdialog', 'aria-live':'polite' },
    h('div', { className:'confirm-toast-msg' }, message),

      h('button', { className:'confirm-toast-btn '+variant, onClick:onConfirm, autoFocus:true }, label)
    )
  );
};

/* Champ date au format français JJ/MM/AAAA ; stocke en ISO YYYY-MM-DD via onChange(iso). */
const isoToFR = (iso) => { const m = iso && String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/); return m ? m[3]+'/'+m[2]+'/'+m[1] : ''; };
const frToIso = (fr) => {
  const m = String(fr||'').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m) return '';
  const dd = Number(m[1]), mm = Number(m[2]), yyyy = Number(m[3]);
  const d = new Date(yyyy, mm - 1, dd);
  if(isNaN(d) || d.getFullYear() !== yyyy || d.getMonth() !== mm - 1 || d.getDate() !== dd) return '';
  return m[3] + '-' + m[2] + '-' + m[1];
};
const DateFR = ({ value, onChange, className }) => {
  const [text, setText] = useState(isoToFR(value));
  useEffect(() => { setText(isoToFR(value)); }, [value]);
  const handle = (e) => {
    const digits = e.target.value.replace(/\D/g, '').substring(0, 8);
    let out = digits.substring(0, 2);
    if(digits.length >= 3) out += '/' + digits.substring(2, 4);
    if(digits.length >= 5) out += '/' + digits.substring(4, 8);
    setText(out);
    const iso = frToIso(out);
    if(iso) onChange(iso);
    else if(out === '') onChange('');
  };
  const handleBlur = () => { const iso = frToIso(text); if(!iso && text !== '') setText(isoToFR(value)); };
  return h('input', { className: className || 'field-input field-date', type:'text', inputMode:'numeric', placeholder:'JJ/MM/AAAA', maxLength:10, value:text, onChange:handle, onBlur:handleBlur });
};

/* ---- JSON syntax highlighting (pour la vue JSON) ---- */
function highlightJSON(obj){
  const str = JSON.stringify(obj, null, 2);
  const esc = str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"\s*:)|("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*")|\b(true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?/g,
    function(m){
      if(/^"/.test(m)){ return /:$/.test(m) ? '<span class="jk">'+m+'</span>' : '<span class="js">'+m+'</span>'; }
      if(/true|false|null/.test(m)){ return '<span class="jb">'+m+'</span>'; }
      return '<span class="jn">'+m+'</span>';
    });
}

/* Suit prefers-color-scheme au premier rendu ; un clic fige un override de session
   (pas de persistance entre rechargements - localStorage interdit par CLAUDE.md). */
function ThemeToggle(){
  const [theme, setTheme] = useState(() => {
    const current = document.documentElement.getAttribute('data-theme');
    if(current === 'dark' || current === 'light') return current;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);
  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return h('button', {
    type:'button', className:'theme-toggle', onClick:toggle,
    'aria-label': theme === 'dark' ? 'Passer en mode clair' : 'Passer en mode sombre',
    title: theme === 'dark' ? 'Mode clair' : 'Mode sombre'
  },
    theme === 'dark'
      ? h('svg', { viewBox:'0 0 20 20', width:'16', height:'16', fill:'none', stroke:'currentColor', strokeWidth:'1.6', strokeLinecap:'round', strokeLinejoin:'round', 'aria-hidden':'true' },
          h('circle', { cx:'10', cy:'10', r:'3.2' }),
          h('path', { d:'M10 2v2M10 16v2M2 10h2M16 10h2M4.5 4.5l1.4 1.4M14.1 14.1l1.4 1.4M4.5 15.5l1.4-1.4M14.1 5.9l1.4-1.4' }))
      : h('svg', { viewBox:'0 0 20 20', width:'16', height:'16', fill:'none', stroke:'currentColor', strokeWidth:'1.6', strokeLinecap:'round', strokeLinejoin:'round', 'aria-hidden':'true' },
          h('path', { d:'M16.5 12.5A7 7 0 1 1 7.5 3.5a5.5 5.5 0 0 0 9 9z' })),
    h('span', { className:'theme-toggle-label' }, theme === 'dark' ? 'Clair' : 'Sombre')
  );
}

/* Parse ISO ou YYYY-MM-DD en Date locale, null si invalide. */
function parseDate(str){
  if(!str) return null;
  const s = String(str);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m){
    const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    return isNaN(d) ? null : d;
  }
  const d2 = new Date(s);
  return isNaN(d2) ? null : d2;
}
function formatDateFR(str){
  const d = parseDate(str);
  return d ? d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }) : '';
}
function formatDateShort(str){
  const d = parseDate(str);
  return d ? d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' }) : '';
}
function daysBetween(a, b){ return (b - a) / 86400000; }
/* Fin effective : date_fin ou dernier évènement ≤ 1 an après début, sinon début+30j. */
function computeEffectiveEnd(data){
  if(data.date_fin){ const p = parseDate(data.date_fin); if(p) return p; }
  let latest = null;
  const debut = parseDate(data.date_debut);
  (data.evenements || []).forEach(ev => {
    const pe = parseDate(ev.date);
    if(!pe) return;
    if(debut && Math.abs(pe - debut) > 3650 * 86400000) return;
    if(!latest || pe > latest) latest = pe;
  });
  if(latest) return latest;
  if(debut) return new Date(debut.getTime() + 30 * 86400000);
  return new Date();
}
function computeIncidentTimeRange(data){
  const stamps = [];
  const pd = parseDate(data.date_debut); if(pd) stamps.push(pd.getTime());
  const eff = computeEffectiveEnd(data); if(eff) stamps.push(eff.getTime());
  (data.evenements || []).forEach(ev => { const p = parseDate(ev.date); if(p) stamps.push(p.getTime()); });
  if(!stamps.length){
    const now = new Date();
    return { start:new Date(now.getTime() - 30 * 86400000), end:new Date(now.getTime() + 30 * 86400000) };
  }
  const min = Math.min.apply(null, stamps);
  const max = Math.max.apply(null, stamps);
  const range = max - min;
  const margin = Math.max(range * 0.05, 3 * 86400000);
  return { start:new Date(min - margin), end:new Date(max + margin) };
}
function dateToPercent(str, range){
  const d = parseDate(str);
  if(!d) return -1;
  const total = range.end - range.start;
  if(total <= 0) return 0;
  return ((d - range.start) / total) * 100;
}
function generateAxisTicks(range){
  const total = daysBetween(range.start, range.end);
  let interval;
  if(total <= 14) interval = 1;
  else if(total <= 45) interval = 7;
  else if(total <= 120) interval = 14;
  else if(total <= 365) interval = 30;
  else interval = 60;
  const ticks = [];
  let cur = new Date(range.start);
  if(interval === 7){
    const day = cur.getDay();
    const until = (8 - day) % 7;
    cur.setDate(cur.getDate() + until);
  } else if(interval >= 14){
    cur.setDate(1);
    if(cur < range.start){
      cur.setDate(15);
      if(cur < range.start){ cur.setMonth(cur.getMonth() + 1); cur.setDate(1); }
    }
  }
  let safety = 0;
  while(cur <= range.end && safety < 200){
    ticks.push(new Date(cur));
    if(interval >= 30){ cur = new Date(cur); cur.setMonth(cur.getMonth() + (interval >= 60 ? 2 : 1)); }
    else cur = new Date(cur.getTime() + interval * 86400000);
    safety++;
  }
  return ticks;
}

function estimateBubbleWidth(ev, tooltipMaxW){
  const title = (ev.label || ev.description || ev.type || '').toString();
  const dateLabel = '00 xxxxxx 0000';
  const charPx = 6.8;
  const headerRowPx = dateLabel.length * 5.8 + 16;
  const titlePx = title.length * charPx + 28;
  const natural = Math.max(headerRowPx, titlePx);
  return Math.min(tooltipMaxW, Math.max(120, natural));
}

  const getAngleFromPosition = (x, y) => {
    const dx = x - DIAMOND_LAYOUT.centerX, dy = y - DIAMOND_LAYOUT.centerY;

    const sx = svgRef.current.viewBox.baseVal.width / rect.width;
    const sy = svgRef.current.viewBox.baseVal.height / rect.height;
    const x = (e.clientX - rect.left) * sx / zoomLevel;
    const y = (e.clientY - rect.top)  * sy / zoomLevel;
    const newAngle = getAngleFromPosition(x, y);
    const radius =
      draggingNode.type==='adversary'      ? DIAMOND_LAYOUT.radiusAdversary :
      draggingNode.type==='capability'     ? DIAMOND_LAYOUT.radiusCapability :
      draggingNode.type==='infrastructure' ? DIAMOND_LAYOUT.radiusInfrastructure :

          if(c.pays) w += `* '''Pays :''' ${ew(c.pays)}\n`;
          if(c.region) w += `* '''R\u00e9gion :''' ${ew(c.region)}\n`;
          if(c.description_libre) w += `* '''Description :''' ${ew(c.description_libre)}\n`;
          if(c.type_cible?.length) w += `* '''Type de cible :''' ${c.type_cible.map(ew).join(', ')}\n`;
        }
      });
      w += `\n`;
    }

    w += `== Infrastructure (Diamond Model) ==\n`;
    if(incident.canaux_diffusion?.some(c=>c.plateforme)){
      w += `\n=== Canaux de diffusion ===\n`;
      w += `{| class="wikitable"\n! Canal !! Plateforme !! Ampleur\n`;
      incident.canaux_diffusion.forEach(c => { if(c.plateforme){ w += `|-\n| ${ew(c.canal)} || ${ew(c.plateforme)} || ${ew(c.ampleur)}\n`; }});
      w += `|}\n\n`;
    }
    if(incident.relais?.some(r=>r.nom)){
      w += `=== Relais / Interm\u00e9diaires ===\n`;
      incident.relais.forEach(r => { if(r.nom){ w += `* '''${ew(r.nom)}''' : ${ew(r.type) || 'N/A'} - ${ew(r.role) || 'N/A'} (${ew(r.degre_conscience) || 'N/A'})\n`; }});
      w += `\n`;
    }

    w += `== Capacit\u00e9s (Capability - Diamond Model) ==\n`;
    if(incident.techniques?.some(t=>t.code_disarm||t.nom)){
      w += `\n=== Techniques DISARM ===\n`;
      w += `{| class="wikitable"\n! Code !! Nom !! Description\n`;
      incident.techniques.forEach(t => { if(t.code_disarm||t.nom){ w += `|-\n| ${ew(t.code_disarm)} || ${ew(t.nom)} || ${ew(t.description)}\n`; }});
      w += `|}\n\n`;
    }
    if(incident.techniques_dima?.some(t=>t.code_dima||t.nom)){
      w += `\n=== Techniques DIMA (Digital Influence Manipulation Analysis) ===\n`;
      w += `{| class="wikitable"\n! Code !! Nom !! Description\n`;
      incident.techniques_dima.forEach(t => { if(t.code_dima||t.nom){ w += `|-\n| ${ew(t.code_dima)} || ${ew(t.nom)} || ${ew(t.description)}\n`; }});
      w += `|}\n\n`;
    }
    if(incident.formats_contenu?.some(f=>f.format)){
      w += `\n=== Formats de contenu ===\n`;
      w += `{| class="wikitable"\n! Format !! Langue\n`;
      incident.formats_contenu.forEach(f => { if(f.format){ w += `|-\n| ${ew(f.format)} || ${ew(f.langue)}\n`; }});
      w += `|}\n\n`;
    }
    if(incident.leviers_psychologiques?.length){
      w += `=== Leviers psychologiques (Cialdini) ===\n`;
      incident.leviers_psychologiques.forEach(l => { w += `* ${ew(l)}\n`; });
      w += `\n`;
    }

    w += `== Narratifs et objectifs ==\n`;
    if(incident.objectifs?.some(o=>o.type_objectif)){
      w += `\n=== Objectifs ===\n`;
      incident.objectifs.forEach(o => { if(o.type_objectif){ w += `* '''${ew(o.type_objectif)}''' : ${ew(o.description) || 'N/A'}\n`; }});
      w += `\n`;
    }
    if(incident.narratifs?.some(n=>n.description)){
      w += `=== Narratifs ===\n`;
      incident.narratifs.forEach((n, idx) => {
        if(n.description){
          w += `\n'''Narratif ${idx+1} :'''\n`;
          w += `* Description : ${ew(n.description)}\n`;
          w += `* V\u00e9racit\u00e9 : ${ew(n.veracite) || 'N/A'}\n`;
          if(n.themes?.some(t=>t)) w += `* Th\u00e8mes : ${n.themes.filter(t=>t).map(ew).join(', ')}\n`;
        }
      });
      w += `\n`;
    }

    if(incident.evenements?.length){
      w += `== Chronologie ==\n`;
      w += `{| class="wikitable"\n! Date !! Type !! \u00c9v\u00e9nement !! Description\n`;
      const allEvents = [];
      if(incident.date_debut) allEvents.push({ date:incident.date_debut, type:'start', label:'D\u00e9but de l\u2019incident', description:incident.code_operation });
      if(incident.evenements) allEvents.push(...incident.evenements);
      if(incident.date_fin)   allEvents.push({ date:incident.date_fin,   type:'end',   label:'Fin de l\u2019incident',   description:incident.code_operation });
      allEvents.sort((a,b)=> new Date(a.date) - new Date(b.date));
      allEvents.forEach(ev => { w += `|-\n| ${ew(ev.date)} || ${ew(ev.type)} || ${ew(ev.label)} || ${ew(ev.description)}\n`; });
      w += `|}\n\n`;
    }

    if(incident.documents?.some(d=>d.titre) || incident.mots_cles?.length){
      w += `== Documentation ==\n`;
      if(incident.documents?.some(d=>d.titre)){
        w += `\n=== Documents de r\u00e9f\u00e9rence ===\n`;
        incident.documents.forEach(d => {
          if(d.titre){
            const safeUrl = ewu(d.url);
            w += `* '''${ew(d.titre)}''' (${ew(d.type) || 'N/A'}) : ${safeUrl ? `[${safeUrl} Lien]` : 'N/A'}\n`;
          }
        });
        w += `\n`;
      }
      if(incident.mots_cles?.length){
        w += `=== Mots-cl\u00e9s ===\n`;
        w += incident.mots_cles.map(ew).join(', ') + '\n\n';
      }
    }

    // Section Analyse SAT (deception detection + techniques appliquees)
    const dd = incident.deception_detection || {};
    const hasDD = dd.mom_checked || dd.pop_checked || dd.moses_checked || dd.eve_checked || (dd.notes && dd.notes.length > 0);
    const satApplied = (incident.structured_techniques_applied || []).filter(s => s.technique_nom);
    if(hasDD || satApplied.length > 0){
      w += `== Analyse SAT ==\n\n`;
      w += `''Techniques analytiques structur\u00e9es appliqu\u00e9es \u00e0 ce dossier (Pherson & Heuer, 4e \u00e9d., 2021).''\n\n`;
      if(hasDD){
        w += `=== D\u00e9tection de tromperie ===\n`;
        w += `{| class="wikitable"\n! Indice !! D\u00e9tect\u00e9\n`;
        w += `|-\n| '''MOM''' (Motive, Opportunity, Means) || ${dd.mom_checked ? 'Oui' : 'Non'}\n`;
        w += `|-\n| '''POP''' (Past Opposition Practices) || ${dd.pop_checked ? 'Oui' : 'Non'}\n`;
        w += `|-\n| '''MOSES''' (Manipulability Of SourcES) || ${dd.moses_checked ? 'Oui' : 'Non'}\n`;
        w += `|-\n| '''EVE''' (Evaluation of the Evidence) || ${dd.eve_checked ? 'Oui' : 'Non'}\n`;
        w += `|}\n\n`;
        if(dd.notes){
          w += `'''Notes :''' ${ew(dd.notes)}\n\n`;
        }
      }
      if(satApplied.length > 0){
        w += `=== Techniques SAT appliqu\u00e9es ===\n`;
        satApplied.forEach(sat => {
          let line = `* '''${ew(sat.technique_nom)}'''`;
          if(sat.technique_id) line += ` (${ew(sat.technique_id)})`;
          if(sat.date_application) line += ` - appliqu\u00e9e le ${ew(sat.date_application)}`;
          if(sat.analyste) line += ` par ${ew(sat.analyste)}`;
          w += line + `\n`;
          if(sat.notes) w += `: ${ew(sat.notes)}\n`;
        });
        w += `\n`;
      }
    }

    w += `----\n`;
    w += `''Fiche g\u00e9n\u00e9r\u00e9e automatiquement - r\u00e9f\u00e9rentiels DISARM & DIMA.''\n`;
    w += `\n[[Cat\u00e9gorie:Campagnes d\u2019influence]]\n`;
    if(incident.attaquants.some(a=>a.pays_origine)){
      const pays = [...new Set(incident.attaquants.map(a=>a.pays_origine).filter(p=>p))];
      pays.forEach(p => { w += `[[Cat\u00e9gorie:Campagne_${ew(p).replace(/\s+/g,'_')}]]\n`; });
    }

    if(safeDownload(new Blob([w], { type:'text/plain; charset=utf-8' }),
      `incident-${sanitizeFilename(incident.code_operation)}-mediawiki.txt`)){
      showToast('Export MediaWiki g\u00e9n\u00e9r\u00e9');
    }
  };

  /* ------- Sanitization imports ------- */
  const stripHTMLViaDOMParser = function(str){
    try{
      const doc = new DOMParser().parseFromString(str, 'text/html');
      return (doc && doc.body && typeof doc.body.textContent === 'string') ? doc.body.textContent : str;
    }catch(e){ return str; }
  };
  const stripHTMLViaRegex = function(str){
    return str
      .replace(/<script[\s\S]*?<\/script>/gi,'')
      .replace(/<style[\s\S]*?<\/style>/gi,'')
      .replace(/<iframe[\s\S]*?<\/iframe>/gi,'')
      .replace(/<[^>]*>/g,'')
      .replace(/on\w+\s*=/gi,'')
      .replace(/javascript\s*:/gi,'')
      .replace(/vbscript\s*:/gi,'')
      .replace(/data\s*:/gi,'');
  };
  const sanitizeString = function(str, maxLen){
    if(maxLen===undefined) maxLen = 5000;
    if(typeof str !== 'string') return '';
    const pass1 = stripHTMLViaDOMParser(str);
    const pass2 = stripHTMLViaRegex(pass1);
    return pass2.substring(0, maxLen);
  };
  const sanitizeUrl = function(url){
    if(typeof url !== 'string') return '';
    const trimmed = url.trim();
    if(trimmed === '') return '';
    try{
      const parsed = new URL(trimmed);
      if(parsed.protocol === 'http:' || parsed.protocol === 'https:') return trimmed.substring(0, 2048);
    }catch(e){}
    return '';
  };
  const sanitizeArray = function(arr, sanitizeFn, maxItems){
    if(maxItems===undefined) maxItems = 100;
    if(!Array.isArray(arr)) return [];
    return arr.slice(0, maxItems).map(sanitizeFn);
  };
  const sanitizeIncident = function(data){
    if(typeof data !== 'object' || data === null || Array.isArray(data)) return null;
    // maxLen aligné saisie/viewer
    return {
      code_operation: sanitizeString(data.code_operation, 200),
      date_creation: sanitizeString(data.date_creation, 20),
      date_derniere_maj: sanitizeString(data.date_derniere_maj, 20),
      statut: sanitizeString(data.statut, 50),
      efficacite_estimee: sanitizeString(data.efficacite_estimee, 200),
      portee_estimee: sanitizeString(data.portee_estimee, 200),
      date_debut: sanitizeString(data.date_debut, 20),
      date_fin: sanitizeString(data.date_fin, 20),
      commentaires: sanitizeString(data.commentaires, 10000),
      attaquants: sanitizeArray(data.attaquants || [], a => ({
        nom: sanitizeString(a.nom, 500),
        type: sanitizeString(a.type, 100),
        pays_origine: sanitizeString(a.pays_origine, 200),
        niveau_attribution: sanitizeString(a.niveau_attribution, 100),
        role_dans_operation: sanitizeString(a.role_dans_operation, 1000),
        description: sanitizeString(a.description, 5000)
      })),
      cibles: sanitizeArray(data.cibles || [], c => ({
        pays: sanitizeString(c.pays, 200),
        region: sanitizeString(c.region, 200),
        description_libre: sanitizeString(c.description_libre, 5000),
        type_cible: sanitizeArray(c.type_cible || [], t => sanitizeString(t, 50), 10)
      })),
      canaux_diffusion: sanitizeArray(data.canaux_diffusion || [], c => ({
        canal: sanitizeString(c.canal, 500),
        plateforme: sanitizeString(c.plateforme, 500),
        ampleur: sanitizeString(c.ampleur, 500)
      })),
      relais: sanitizeArray(data.relais || [], r => ({
        nom: sanitizeString(r.nom, 500),
        type: sanitizeString(r.type, 200),
        role: sanitizeString(r.role, 1000),
        degre_conscience: sanitizeString(r.degre_conscience, 100)
      })),
      techniques: sanitizeArray(data.techniques || [], t => ({
        code_disarm: sanitizeString(t.code_disarm, 50),
        nom: sanitizeString(t.nom, 500),
        description: sanitizeString(t.description, 5000)
      })),
      techniques_dima: sanitizeArray(data.techniques_dima || [], t => ({
        code_dima: sanitizeString(t.code_dima, 50),
        nom: sanitizeString(t.nom, 500),
        description: sanitizeString(t.description, 5000)
      })),
      formats_contenu: sanitizeArray(data.formats_contenu || [], f => ({
        format: sanitizeString(f.format, 200),
        langue: sanitizeString(f.langue, 100)
      })),
      objectifs: sanitizeArray(data.objectifs || [], o => ({
        type_objectif: sanitizeString(o.type_objectif, 200),
        description: sanitizeString(o.description, 5000)
      })),
      narratifs: sanitizeArray(data.narratifs || [], n => ({
        description: sanitizeString(n.description, 10000),
        veracite: sanitizeString(n.veracite, 100),
        themes: sanitizeArray(n.themes || [], t => sanitizeString(t, 200), 50)
      })),
      leviers_psychologiques: sanitizeArray(data.leviers_psychologiques || [], l => sanitizeString(l, 200), 20),
      documents: sanitizeArray(data.documents || [], d => ({
        titre: sanitizeString(d.titre, 500),
        type: sanitizeString(d.type, 100),
        url: sanitizeUrl(d.url)
      })),
      mots_cles: sanitizeArray(data.mots_cles || [], m => sanitizeString(m, 200), 100),
      mots_cles_text: '',
      evenements: sanitizeArray(data.evenements || [], ev => ({
        date: sanitizeString(ev.date, 20),
        type: sanitizeString(ev.type, 50),
        label: sanitizeString(ev.label, 500),
        description: sanitizeString(ev.description, 5000)
      })),
      deception_detection: (() => {
        const dd = data.deception_detection || {};
        return { mom_checked: !!dd.mom_checked, pop_checked: !!dd.pop_checked, moses_checked: !!dd.moses_checked, eve_checked: !!dd.eve_checked, notes: sanitizeString(dd.notes || '', 2000) };
      })(),
      structured_techniques_applied: sanitizeArray(data.structured_techniques_applied || [], sat => ({
        technique_id: sanitizeString(sat.technique_id || '', 20),
        technique_nom: sanitizeString(sat.technique_nom || '', 200),
        date_application: sanitizeString(sat.date_application || '', 20),
        analyste: sanitizeString(sat.analyste || '', 100),
        notes: sanitizeString(sat.notes || '', 2000)
      }))
    };
  };

  /* ------- Import (taille max 10 Mo) ------- */
  const MAX_IMPORT_SIZE = 10 * 1024 * 1024;
  const importFile = file => {
    if(!file) return;
    if(file.size > MAX_IMPORT_SIZE){
      notify(`Fichier trop volumineux (${(file.size/1024/1024).toFixed(1)} Mo). Maximum autoris\u00e9 : ${MAX_IMPORT_SIZE/1024/1024} Mo.`);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try{
        let raw = JSON.parse(e.target.result);
        if(raw && typeof raw === 'object' && raw.incident && typeof raw.incident === 'object' && !Array.isArray(raw.incident)){
          raw = raw.incident;
        }
        const sanitized = sanitizeIncident(raw);
        if(!sanitized){ notify('Format de fichier invalide.'); return; }
        setIncident(sanitized);
        setImportOpen(false);
        showToast('Incident import\u00e9');
      }catch(err){
        notify('Erreur lors de l\u2019importation du fichier JSON.');
      }
    };
    reader.readAsText(file);
  };

  /* ------- Prototype pollution guard + updateField ------- */
  const FORBIDDEN_KEYS = ['__proto__','constructor','prototype'];
  const isSafeKey = key => {
    const cleaned = key.replace(/\[\d+\]$/,'');
    return !FORBIDDEN_KEYS.includes(cleaned);
  };
  const updateField = (path, value) => {
    const keys = path.split('.');
    if(keys.some(k => !isSafeKey(k))){
      console.error('Chemin interdit d\u00e9tect\u00e9 (prototype pollution)');
      return;
    }
    const newIncident = { ...incident };
    let current = newIncident;
    for(let i=0; i<keys.length-1; i++){
      const m = keys[i].match(/(.+)\[(\d+)\]/);
      current = m ? current[m[1]][parseInt(m[2])] : current[keys[i]];
    }
    const lastKey = keys[keys.length-1];
    const m = lastKey.match(/(.+)\[(\d+)\]/);
    if(m) current[m[1]][parseInt(m[2])] = value;
    else current[lastKey] = value;
    setIncident(newIncident);
  };

  /* ------- Plafonnement tableaux dynamiques + URL safe ------- */
  const MAX_ARRAY_SIZE = 100;
  const isUnsafeUrl = function(url){
    if(typeof url !== 'string' || url.trim() === '') return false;
    const lower = url.trim().toLowerCase();
    return lower.startsWith('javascript:') || lower.startsWith('data:') || lower.startsWith('vbscript:') || lower.startsWith('blob:');
  };
  const addArrayItem = (path, template) => {
    const newIncident = { ...incident };
    const keys = path.split('.');
    let current = newIncident;
    for(let i=0; i<keys.length-1; i++) current = current[keys[i]];
    const arr = current[keys[keys.length-1]];
    if(arr.length >= MAX_ARRAY_SIZE){
      notify(`Limite atteinte : maximum ${MAX_ARRAY_SIZE} \u00e9l\u00e9ments par section.`);
      return;
    }
    current[keys[keys.length-1]] = [...arr, template];
    setIncident(newIncident);
  };
  const removeArrayItem = (path, index) => {
    const newIncident = { ...incident };
    const keys = path.split('.');
    let current = newIncident;
    for(let i=0; i<keys.length-1; i++) current = current[keys[i]];
    current[keys[keys.length-1]] = current[keys[keys.length-1]].filter((_,i)=> i!==index);
    setIncident(newIncident);
  };

  /* ------- Autocomplétion : sélection DISARM / DIMA ------- */
  const selectTechnique = (tech, idx) => {
    const newTechs = [...incident.techniques];
    newTechs[idx] = { code_disarm:tech.code, nom:tech.name, description:`Tactique : ${tech.tactic}` };
    setIncident({ ...incident, techniques:newTechs });
    setTechniqueSearch('');
    setActiveTechniqueIndex(null);
  };
  const selectTechniqueDima = (tech, idx) => {
    const newTechs = [...incident.techniques_dima];
    newTechs[idx] = { code_dima:tech.code, nom:tech.name, description:`Tactique : ${tech.tactic}` };
    setIncident({ ...incident, techniques_dima:newTechs });
    setTechniqueSearchDima('');
    setActiveTechniqueDimaIndex(null);
  };
  const selectSATTechnique = (tech, idx) => {
    const a = [...incident.structured_techniques_applied];
    a[idx] = { ...a[idx], technique_id: tech.id, technique_nom: tech.nom };
    setIncident({ ...incident, structured_techniques_applied: a });
    setSatSearch('');
    setActiveSATIndex(null);
  };

  /* ------- Mots-clés et thèmes (avec plafond) ------- */
  const addKeyword = () => {
    if(incident.mots_cles_text.trim()){
      if(incident.mots_cles.length >= MAX_ARRAY_SIZE){
        notify(`Limite atteinte : maximum ${MAX_ARRAY_SIZE} mots-cl\u00e9s.`);
        return;
      }
      setIncident({ ...incident, mots_cles:[...incident.mots_cles, incident.mots_cles_text.trim()], mots_cles_text:'' });
    }
  };
  const removeKeyword = index => setIncident({ ...incident, mots_cles: incident.mots_cles.filter((_,i)=>i!==index) });

  const addNarrativeTheme = nIdx => {
    const newN = [...incident.narratifs];
    if(newN[nIdx].themes.length >= MAX_ARRAY_SIZE){
      notify(`Limite atteinte : maximum ${MAX_ARRAY_SIZE} th\u00e8mes par narratif.`);
      return;
    }
    newN[nIdx].themes = [...newN[nIdx].themes, ''];
    setIncident({ ...incident, narratifs:newN });
  };
  const removeNarrativeTheme = (nIdx, tIdx) => {
    const newN = [...incident.narratifs];
    newN[nIdx].themes = newN[nIdx].themes.filter((_,i)=>i!==tIdx);
    setIncident({ ...incident, narratifs:newN });
  };

  const addTimelineEvent = () => {
    if(newEventDate && newEventLabel){
      if((incident.evenements || []).length >= MAX_ARRAY_SIZE){
        notify(`Limite atteinte : maximum ${MAX_ARRAY_SIZE} \u00e9v\u00e9nements.`);
        return;
      }
      setIncident({ ...incident, evenements:[...(incident.evenements||[]), { date:newEventDate, type:newEventType, label:newEventLabel, description:newEventDesc }] });
      setNewEventDate(''); setNewEventLabel(''); setNewEventDesc(''); setNewEventType('custom');
    }
  };

  /* ------- Complétude (12 checks, identique à build-index.py) ------- */
  const completude = useMemo(() => {
    const c = {
      code_operation: !!incident.code_operation,
      date_debut: !!incident.date_debut,
      date_fin: !!incident.date_fin,
      attaquants: incident.attaquants.some(a=>a.nom),
      cibles: incident.cibles.some(c=>c.pays),
      techniques_disarm: incident.techniques.some(t=>t.code_disarm),
      techniques_dima: incident.techniques_dima.some(t=>t.code_dima),
      narratifs: incident.narratifs.some(n=>n.description),
      canaux: incident.canaux_diffusion.some(c=>c.plateforme),
      documents: incident.documents.some(d=>d.url),
      mots_cles: incident.mots_cles.length >= 3,
      objectifs: incident.objectifs.some(o=>o.type_objectif)
    };
    const filled = Object.values(c).filter(Boolean).length;
    return { pct: Math.round(filled/Object.keys(c).length*100), filled, total: Object.keys(c).length };
  },[incident]);

  /* Comptes par section pour la sidebar */
  const sectionCounts = {
    adversary: incident.attaquants.filter(a=>a.nom).length,
    victim: incident.cibles.filter(c=>c.pays||c.description_libre).length,
    infrastructure: incident.canaux_diffusion.filter(c=>c.plateforme).length + incident.relais.filter(r=>r.nom).length,
    capability: incident.techniques.filter(t=>t.code_disarm||t.nom).length + incident.techniques_dima.filter(t=>t.code_dima||t.nom).length,
    narrative: incident.narratifs.filter(n=>n.description).length + incident.objectifs.filter(o=>o.type_objectif).length,
    documentation: incident.documents.filter(d=>d.titre).length + incident.mots_cles.length,
    sat: (incident.deception_detection?.mom_checked || incident.deception_detection?.pop_checked || incident.deception_detection?.moses_checked || incident.deception_detection?.eve_checked ? 1 : 0) + incident.structured_techniques_applied.filter(s=>s.technique_nom).length
  };

  /* ===================================================================
     RENDU
  =================================================================== */

  /* ---- Sidebar ---- */
  const renderSidebar = () => h('aside', { className:'sidebar' },
    h('h1', { className:'sidebar-brand' }, 'Fiche d\u2019incident', h('em', null, ' /\u00a0num.')),
    h('div', { className:'sidebar-sub' }, 'Saisie analyste - v', TOOL_VERSION),

    h('div', { className:'s-section' },
      h('div', { className:'s-label' }, h('span', null, 'Sommaire'), h('span', { className:'s-label-right' }, SECTIONS.length, ' §')),
      SECTIONS.map(s => h('button', {
        key:s.id, onClick:()=>{ setActiveSection(s.id); setViewMode('form'); },
        className: 'nav-item' + (activeSection===s.id && viewMode==='form' ? ' active' : '')
      },
        h('span', { className:'nav-num' }, '§', s.num),
        h('span', { className:'nav-label' }, s.label),
        sectionCounts[s.id] !== undefined && sectionCounts[s.id] > 0 &&
          h('span', { className:'nav-count' }, sectionCounts[s.id])
      ))

            h('button', { className:'icon-btn', onClick:exportSVG, title:'Export SVG' }, h(ImageIcon)),
            h('button', { className:'icon-btn', onClick:()=>setZoomLevel(Math.min(zoomLevel+0.2, 2)), title:'Zoom +' }, h(ZoomIn)),
            h('button', { className:'icon-btn', onClick:()=>setZoomLevel(Math.max(zoomLevel-0.2, 0.5)), title:'Zoom \u2212' }, h(ZoomOut))
          )
        ),
        h('p', { className:'section-desc' }, 'Mod\u00e8le diamant \u00e0 quatre anneaux. ',
          h('em', null, 'Glissez-d\u00e9posez un n\u0153ud pour r\u00e9organiser la vue.')),

        h('div', { className:'diamond-filters' },
          circles.slice().reverse().map(c => h('label', { key:c.id, className:'check-row', style:{ padding:'4px 0' } },
            h('input', { className:'check-box', type:'checkbox', checked:filters[c.id], onChange:()=>toggleFilter(c.id) }),
            h('span', null, c.label)
          ))
        ),

        h('div', { className:'diamond-view' },
          h('div', { className:'diamond-canvas' },
            h('svg', {
              ref:svgRef, viewBox:'0 0 800 800',
              onMouseMove:handleNodeDrag, onMouseUp:handleNodeDragEnd, onMouseLeave:handleNodeDragEnd
            },
              h('defs', null,
                h('filter', { id:'shadow' },
                  h('feDropShadow', { dx:'0', dy:'2', stdDeviation:'3', floodOpacity:'0.25' })
                )
              ),
              h('g', { transform:`scale(${zoomLevel}) translate(${(1-zoomLevel)*centerX/zoomLevel}, ${(1-zoomLevel)*centerY/zoomLevel})` },
                circles.slice().reverse().filter(c=>filters[c.id]).map(c => h('g', { key:c.id },
                  h('circle', { cx:centerX, cy:centerY, r:c.radius, fill:c.fill, stroke:c.stroke, strokeWidth:'1.5', opacity:'0.6' }),
                  h('text', { x:centerX, y:centerY - c.radius - 12, textAnchor:'middle',
                    fill:c.stroke, fontSize:'11', fontFamily:'JetBrains Mono, monospace',
                    fontWeight:'500', letterSpacing:'0.1em' }, c.label.toUpperCase())
                )),
                filters.adversary && sectors.map((sector, si) => {
                  const startRad = (sector.startAngle-90)*(Math.PI/180);
                  const endRad = (sector.endAngle-90)*(Math.PI/180);
                  const largeArcFlag = sector.endAngle - sector.startAngle > 180 ? 1 : 0;
                  const x1 = centerX + radiusAdversary*Math.cos(startRad);
                  const y1 = centerY + radiusAdversary*Math.sin(startRad);
                  const x2 = centerX + radiusAdversary*Math.cos(endRad);
                  const y2 = centerY + radiusAdversary*Math.sin(endRad);
                  const midAngle = (sector.startAngle+sector.endAngle)/2;
                  const labelRad = (midAngle-90)*(Math.PI/180);
                  const labelX = centerX + (radiusAdversary-30)*Math.cos(labelRad);
                  const labelY = centerY + (radiusAdversary-30)*Math.sin(labelRad);
                  return h('g', { key:si },
                    h('path', { d:`M ${centerX} ${centerY} L ${x1} ${y1} A ${radiusAdversary} ${radiusAdversary} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`,
                      fill:sector.color, opacity:'0.18', stroke:'#FFFFFF', strokeWidth:'1' }),
                    h('text', { x:labelX, y:labelY, textAnchor:'middle', fill:'#3F4650', fontSize:'9',
                      fontFamily:'JetBrains Mono, monospace', fontWeight:'500', letterSpacing:'0.05em' }, sector.label)
                  );
                }),
                h('g', null,
                  h('circle', { cx:centerX, cy:centerY, r:20, fill:'#0F1419', stroke:'#FFFFFF', strokeWidth:'3', filter:'url(#shadow)' }),
                  h('text', { x:centerX, y:centerY+4, textAnchor:'middle', fill:'#FFFFFF',
                    fontSize:'11', fontFamily:'JetBrains Mono, monospace', fontWeight:'500' }, 'CORE')
                ),
                nodes.map(node => {
                  const currentPos = nodePositions[node.id] || { x:node.x, y:node.y };
                  return h('g', { key:node.id,
                    onMouseDown: e => handleNodeDragStart(e, node),
                    onClick: ()=>setSelectedNode(node),
                    style:{ cursor:'move' }
                  },
                    h('line', { x1:centerX, y1:centerY, x2:currentPos.x, y2:currentPos.y,
                      stroke:'#D1D5DB', strokeWidth:'1', strokeDasharray:'3,3', opacity:'0.5' }),
                    h('circle', { cx:currentPos.x, cy:currentPos.y, r:13,
                      fill:nodeColor[node.type], stroke:'#FFFFFF', strokeWidth:'2.5',
                      opacity: selectedNode?.id === node.id ? 1 : 0.92,
                      filter:'url(#shadow)' }),
                    h('text', { x:currentPos.x, y:currentPos.y-22, textAnchor:'middle',
                      fill:'#0F1419', fontSize:'11', fontFamily:'Inter, sans-serif',
                      fontWeight:'500' }, node.label.length>18 ? node.label.substring(0,18)+'…' : node.label)
                  );
                })
              )
            ),
            h('div', { style:{ padding:'12px 18px', borderTop:'1px solid var(--rule)', background:'var(--paper-sunken)' } },
              h('div', { className:'legend' },
                Object.entries(nodeColor).map(([k,v]) => h('div', { key:k, className:'legend-row', style:{ display:'inline-flex', marginRight:18 } },
                  h('span', { className:'legend-dot', style:{ background:v } }),
                  h('span', null, circles.find(c=>c.id===k)?.label || k)
                ))
              )
            )
          ),

          selectedNode ? h('div', { className:'diamond-detail' },
            h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'baseline' } },
              h('h3', { className:'diamond-detail-title' }, 'D\u00e9tails'),
              h('button', { className:'remove-btn', onClick:()=>setSelectedNode(null), title:'Fermer' }, h(X))
            ),
            h('div', { className:'diamond-detail-row' }, h('em', null, 'Type'),   h('span', null, circles.find(c=>c.id===selectedNode.type)?.label || selectedNode.type)),
            h('div', { className:'diamond-detail-row' }, h('em', null, 'Libell\u00e9'), h('span', null, selectedNode.label)),
            selectedNode.subtype && h('div', { className:'diamond-detail-row' }, h('em', null, 'Attribution'), h('span', null, selectedNode.subtype)),
            selectedNode.data && h('pre', { className:'diamond-detail-raw' }, JSON.stringify(selectedNode.data, null, 2))
          ) : h('div', { className:'diamond-detail' },
            h('h3', { className:'diamond-detail-title' }, 'Inspection'),
            h('p', { style:{ color:'var(--ink-muted)', fontSize:13, lineHeight:1.55, margin:0 } },
              'S\u00e9lectionnez un n\u0153ud pour afficher ses donn\u00e9es compl\u00e8tes.'),
            h('div', { className:'legend', style:{ marginTop:18 } },
              h('div', null, nodes.length, ' n\u0153ud', nodes.length > 1 ? 's' : '', ' visible', nodes.length > 1 ? 's' : '')
            )
          )
        )
      )
    );
  };

  /* Retire un évènement personnalisé par index dans incident.evenements. */
  const removeTimelineEvent = (idx) => {
    const next = (incident.evenements || []).slice();
    next.splice(idx, 1);
    setIncident({ ...incident, evenements: next });
  };

  /* ---- Vue Timeline ---- */
  const renderTimelineView = () => {
    const hasEvents = timelineEvents.length > 0;
    const range = computeIncidentTimeRange(incident);
    const ticks = hasEvents ? generateAxisTicks(range) : [];
    const attaquant = (incident.attaquants && incident.attaquants[0]) || {};
    const cibles = (incident.cibles || []).map(c => c.region || c.pays || '').filter(Boolean).slice(0, 2).join(' + ');
    const statutLabels = { en_cours:'En cours', terminee:'Termin\u00e9e', en_analyse:'En analyse', archivee:'Archiv\u00e9e' };
    const statutLabel = statutLabels[incident.statut] || incident.statut || '';

    const barStart = dateToPercent(incident.date_debut, range);
    const eff = computeEffectiveEnd(incident);
    const barEndStr = incident.date_fin || (eff ? eff.toISOString().split('T')[0] : '');
    const barEnd = dateToPercent(barEndStr, range);
    const hasBar = barStart >= 0 && barEnd >= 0 && barEnd > barStart;

    const TIER_COUNT = 4;
    const trackPxW = 900;
    const TT_MAXW = 280;
    const GAP_PX = 8;
    const eventsWithPct = timelineEvents.map((ev, i) => {
      let pct = dateToPercent(ev.date, range);
      pct = Math.max(0, Math.min(100, pct));
      return { ev, idx:i, pct, tier:0 };
    }).sort((a, b) => a.pct - b.pct);
    const tierLastRightPct = [-Infinity, -Infinity, -Infinity, -Infinity];
    eventsWithPct.forEach(item => {
      const bw = estimateBubbleWidth(item.ev, TT_MAXW);
      const bwPct = (bw / trackPxW) * 100;
      const gapPct = (GAP_PX / trackPxW) * 100;
      const leftEdge = item.pct - bwPct / 2;
      const rightEdge = item.pct + bwPct / 2;
      let assigned = TIER_COUNT - 1;
      for(let t = 0; t < TIER_COUNT; t++){
        if(leftEdge >= tierLastRightPct[t] + gapPct){ assigned = t; break; }
      }
      item.tier = assigned;
      tierLastRightPct[assigned] = rightEdge;
    });

    const renderMarker = (item) => {
      const ev = item.ev;
      const pct = item.pct;
      const tier = item.tier;
      const typeCls = ev.type === 'start' ? 'start'
        : ev.type === 'end' ? 'end'
        : ev.type === 'analysis' ? 'analysis'
        : ev.type === 'attribution' ? 'attribution'
        : 'custom';
      let alignCls = '';
      if(pct < 12) alignCls = ' align-left';
      else if(pct > 88) alignCls = ' align-right';
      const isFlipped = (tier === 1 || tier === 3);
      const extra = (tier === 2 || tier === 3) ? 24 : 0;
      const ttStyle = { maxWidth: 280 };
      if(isFlipped){ ttStyle.bottom = 'auto'; ttStyle.top = 'calc(100% + ' + (10 + extra) + 'px)'; }
      else if(extra > 0){ ttStyle.bottom = 'calc(100% + ' + (10 + extra) + 'px)'; }
      const stemStyle = {};
      if(extra > 0){
        if(isFlipped){ stemStyle.top = 'calc(100% + 6px)'; stemStyle.height = (extra - 2) + 'px'; }
        else { stemStyle.bottom = 'calc(100% + 6px)'; stemStyle.height = (extra - 2) + 'px'; }
      }
      const title = ev.label || ev.description || '';
      const detail = ev.description && ev.label && ev.label !== ev.description ? ev.description : '';
      return h('div', { key:item.idx, className:'tooltip-wrapper', style:{ position:'absolute', left:pct + '%', top:'50%', transform:'translate(-50%, -50%)', zIndex:5 } },
        h('div', { className:'event-marker ' + typeCls, title:ev.label || '' }),
        extra > 0 && h('div', { className:'tooltip-stem ' + (isFlipped ? 'stem-down' : 'stem-up'), style:stemStyle }),
        h('div', { className:'tooltip-content tier-' + tier + (isFlipped ? ' flipped' : '') + alignCls, style:ttStyle },
          h('div', { className:'tt-date' }, formatDateFR(ev.date)),
          h('div', { className:'tt-label' }, title),
          detail && h('div', { className:'tt-desc' }, detail)
        )
      );
    };

    return h('section', { className:'section' },
      h('div', { className:'section-head' },
        h('div', { className:'section-title-wrap' },
          h('span', { className:'section-num' }, 'visual'),
          h('h2', { className:'section-title' }, 'Chronologie')
        )
      ),
      h('p', { className:'section-desc' }, 'Succession des \u00e9v\u00e9nements marquants de l\u2019op\u00e9ration. ',
        h('em', null, 'Les dates de d\u00e9but et de fin sont ajout\u00e9es automatiquement.')),

      h('div', { className:'timeline-add' },
        h('div', { className:'timeline-add-title' }, 'Ajouter un \u00e9v\u00e9nement'),
        h('div', { className:'timeline-add-row' },
          h(DateFR, { value:newEventDate, onChange:setNewEventDate }),
          h('div', { style:{ display:'flex', flexDirection:'column', gap:6 } },
            h('input', { className:'field-input', type:'text', value:newEventLabel, onChange:e=>setNewEventLabel(e.target.value), placeholder:'Titre de l\u2019\u00e9v\u00e9nement' }),
            h('input', { className:'field-input', type:'text', value:newEventDesc, onChange:e=>setNewEventDesc(e.target.value), placeholder:'Description (optionnelle)' })
          ),
          h('select', { className:'field-select', value:newEventType, onChange:e=>setNewEventType(e.target.value) },
            h('option', { value:'custom' }, '\u00c9v\u00e9nement'),
            h('option', { value:'analysis' }, 'Analyse'),
            h('option', { value:'attribution' }, 'Attribution')
          ),
          h('button', { className:'btn btn-primary', onClick:addTimelineEvent }, h(Plus), 'Ajouter')
        )
      ),

      hasEvents ? h('div', { className:'tl-wrap' },
        h('div', { className:'tl-axis' },
          ticks.map((d, i) => {
            const iso = d.toISOString().split('T')[0];
            const pct = dateToPercent(iso, range);
            return h(React.Fragment, { key:i },
              h('div', { className:'date-tick', style:{ left:pct + '%' } }),
              h('div', { className:'date-label-axis', style:{ left:pct + '%' } }, formatDateShort(iso))
            );
          })
        ),
        h('div', { className:'tl-body' },
          h('div', { className:'tl-lane' },
            h('div', { className:'tl-lane-head' },
              h('div', { className:'tl-lane-title' }, attaquant.nom || incident.code_operation || 'Op\u00e9ration'),
              h('div', { className:'tl-lane-meta' },
                cibles && h('span', null, cibles),
                cibles && h('br'),
                statutLabel && h('span', { className:'mono' }, statutLabel)
              ),
              attaquant.niveau_attribution && h('div', { className:'tl-attribution' }, attaquant.niveau_attribution)
            ),
            h('div', { className:'tl-track' },
              hasBar && h('div', { className:'activity-bar', style:{ left:barStart + '%', width:(barEnd - barStart) + '%' } }),
              eventsWithPct.map(renderMarker)
            )
          )
        ),
        h('div', { className:'tl-legend' },
          h('div', { className:'tl-legend-item' }, h('div', { className:'tl-legend-dot start' }), 'D\u00e9but'),
          h('div', { className:'tl-legend-item' }, h('div', { className:'tl-legend-dot custom' }), '\u00c9v\u00e9nement'),
          h('div', { className:'tl-legend-item' }, h('div', { className:'tl-legend-dot analysis' }), 'Analyse'),
          h('div', { className:'tl-legend-item' }, h('div', { className:'tl-legend-dot attribution' }), 'Attribution'),
          h('div', { className:'tl-legend-item' }, h('div', { className:'tl-legend-dot end' }), 'Fin')
        )
      ) : h('div', { className:'timeline-empty' }, 'Aucun \u00e9v\u00e9nement enregistr\u00e9. Ajoutez une date de d\u00e9but ou un \u00e9v\u00e9nement personnalis\u00e9.'),

      hasEvents && (incident.evenements || []).length > 0 && h('div', { className:'tl-events-list', style:{ marginTop:20 } },
        h('div', { className:'tl-events-list-head' }, '\u00c9v\u00e9nements personnalis\u00e9s'),
        (incident.evenements || []).map((ev, idx) => h('div', { key:idx, className:'tl-event-row' },
          h('span', { className:'tl-event-date' }, formatDateFR(ev.date)),
          h('span', null,
            h('span', { className:'tl-event-label' }, ev.label || '(sans titre)'),
            ev.description && h('span', { className:'tl-event-type' }, ev.description)
          ),
          h('button', { className:'btn btn-ghost btn-small', onClick:()=>removeTimelineEvent(idx), 'aria-label':'Supprimer' }, h(Trash))
        ))
      )
    );
  };

  /* ---- Vue JSON ---- */
  const renderJsonView = () => {
    const { mots_cles_text, ...displayIncident } = incident;
    const copyJSON = () => {
      try{
        navigator.clipboard.writeText(JSON.stringify(displayIncident, null, 2))
          .then(()=> showToast('JSON copi\u00e9 dans le presse-papiers'))
          .catch(()=> showToast('Copie impossible', 'err'));
      }catch(e){ showToast('Copie non support\u00e9e', 'err'); }
    };
    return h('section', { className:'section' },
      h('div', { className:'section-head' },
        h('div', { className:'section-title-wrap' },
          h('span', { className:'section-num' }, 'raw'),
          h('h2', { className:'section-title' }, 'Vue JSON')
        ),
        h('button', { className:'btn btn-ghost', onClick:copyJSON }, h(Copy), 'Copier')
      ),
      h('p', { className:'section-desc' }, 'Repr\u00e9sentation brute, utilis\u00e9e pour l\u2019export.'),
      h('pre', { className:'json-view', dangerouslySetInnerHTML:{ __html: highlightJSON(displayIncident) } })
    );
  };

  /* ---- Rendu global ---- */
  return h('div', { className:'app' },
    h('a', { href:'#main-content', className:'skip-link' }, 'Aller au contenu principal'),
    renderSidebar(),
    h('main', { className:'main', id:'main-content', tabIndex:-1 },
      renderMasthead(),
      renderToolbar(),
      viewMode === 'form'     ? currentRenderer() :
      viewMode === 'diamond'  ? renderDiamondView() :
      viewMode === 'timeline' ? renderTimelineView() :
                                 renderJsonView()
    ),
    toast && h('div', { className: 'toast ' + (toast.kind || '') }, toast.msg),
    h(Modal, { open:importOpen, onClose:()=>setImportOpen(false), title:'Importer un incident', eyebrow:'Fiche JSON', small:true },
      h(ImportZone, { onFile: importFile, accept:'.json', hint:'JSON uniquement \u2022 max 10 Mo' })
    ),
    notice && h(ConfirmToast, {
      message: notice.message,
      variant: notice.variant || 'primary',
      onConfirm: () => setNotice(null)
    })
  );
}

/* ---- Mount ---- */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(IncidentForm));
</script>
</body>
</html>
