<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src https://raw.githubusercontent.com https://gitlab.com; object-src 'none'; base-uri 'none'; form-action 'none';">
    <title>visualisation Fiche - v1</title>

    <link rel="stylesheet" href="fonts/local.css">

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #0F1419;
            --surface: #1A2028;
            --surface2: #232A33;
            --border: #2A323D;
            --border-strong: #3B4452;
            --text: #F4F5F7;
            --text-muted: #8B93A0;
            --accent-blue: #6A6AF4;
            --accent-blue-bright: #8D8DF7;
            --accent-blue-dim: rgba(106, 106, 244, 0.14);
            --oxblood: #E05048;
            --ochre: #F59E0B;
            --moss: #EAB308;
            --shadow-tooltip: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
            --surface-tooltip: #2A3240;
            --shadow-marker: 0 1px 4px rgba(0,0,0,0.4);
        }
        :root[data-theme="light"] {
            --bg: #FAFAF9;
            --surface: #FFFFFF;
            --surface2: #F2F3F5;
            --border: #D8DBE0;
            --border-strong: #B9BFC7;
            --text: #0B1016;
            --text-muted: #4B5563;
            --accent-blue: #000091;
            --accent-blue-bright: #6A6AF4;
            --accent-blue-dim: rgba(0, 0, 145, 0.08);
            --oxblood: #C8372D;
            --ochre: #D97706;
            --moss: #CA8A04;
            --shadow-tooltip: 0 4px 20px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            --surface-tooltip: #ECEEF1;
            --shadow-marker: 0 1px 3px rgba(0,0,0,0.15);
        }
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) {
                --bg: #FAFAF9;
                --surface: #FFFFFF;
                --surface2: #F2F3F5;
                --border: #D8DBE0;
                --border-strong: #B9BFC7;
                --text: #0B1016;
                --text-muted: #4B5563;
                --accent-blue: #000091;
                --accent-blue-bright: #6A6AF4;
                --accent-blue-dim: rgba(0, 0, 145, 0.08);
                --oxblood: #C8372D;
                --ochre: #D97706;
                --moss: #CA8A04;
                --shadow-tooltip: 0 4px 20px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
                --surface-tooltip: #ECEEF1;
                --shadow-marker: 0 1px 3px rgba(0,0,0,0.15);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* Subtle grid background */
        .grid-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.1;
            pointer-events: none;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

        /* Animation keyframes */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(106,106,244,0.3); } 50% { box-shadow: 0 0 0 8px rgba(106,106,244,0); } }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out both; }

        /* Drop zone visual */
        .drop-active { border-color: var(--accent-blue) !important; background: var(--accent-blue-dim) !important; }

        /* Tooltip glassmorphic — translucent + backdrop blur, dot indicator, no caret */
        .tooltip-wrapper { position: relative; z-index: 5; }
        .tooltip-content {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-tooltip);
            border: 1px solid rgba(128,128,128,0.18);
            border-top: 2px solid var(--tt-dot, rgba(128,128,128,0.35));
            border-radius: 8px;
            padding: 7px 11px 7px 16px;
            font-size: 12px;
            line-height: 1.45;
            white-space: normal;
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22), 0 0 0 1px rgba(255,255,255,0.03) inset;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.18s, visibility 0.18s;
            max-width: 280px;
        }
        /* dot indicator left side — pinned to type label row */
        .tooltip-content::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 13px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--tt-dot, var(--accent-blue));
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--tt-dot, var(--accent-blue)) 22%, transparent);
        }
        .tooltip-content.flipped {
            bottom: auto;
            top: calc(100% + 12px);
        }
        /* anti-overflow left/right */
        .tooltip-content.align-left {
            left: 0;
            transform: translateX(0);
        }
        .tooltip-content.align-right {
            left: auto;
            right: 0;
            transform: translateX(0);
        }

        /* Tooltip stem — SVG bezier connector (event color), follows override */
        .tooltip-stem {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1px;
            height: 1px;
            overflow: visible;
            pointer-events: none;
        }
        .tooltip-stem path {
            fill: none;
            stroke: var(--tt-dot, var(--border-strong));
            stroke-width: 1.8;
            opacity: 0.55;
            stroke-linecap: round;
            stroke-dasharray: 4 3;
        }
        .tooltip-dragging .tooltip-stem { visibility: hidden; }

        /* Tier-indexed sizing for dense clusters */
        .tooltip-content.tier-2,
        .tooltip-content.tier-3 {
            font-size: 11px;
            padding: 6px 10px 6px 15px;
        }
        .tooltip-content.tier-2 .tooltip-type-label,
        .tooltip-content.tier-3 .tooltip-type-label {
            font-size: 7px;
        }
        .tooltip-wrapper:hover .tooltip-content { visibility: visible; opacity: 1; }
        .tooltip-wrapper:hover { z-index: 20; }

        /* v0.7: Always-visible tooltips mode */
        .tooltips-visible .tooltip-content { visibility: visible; opacity: 1; width: max-content; min-width: 120px; }
        .tooltips-visible .tooltip-wrapper { z-index: 5; }
        .tooltips-visible .tooltip-wrapper:hover { z-index: 20; }

        /* Pinned/draggable tooltips — pulsing halo */
        .tooltip-type-label {
            display: inline-block;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--tt-dot, var(--text-muted));
            opacity: 0.85;
            flex-shrink: 0;
        }
        .tooltip-content.pinned {
            box-shadow: 0 8px 28px rgba(0,0,0,0.32), 0 0 0 1px var(--tt-dot, var(--accent-blue)), 0 0 0 4px var(--accent-blue-dim);
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 15;
            max-height: 220px;
            overflow-y: auto;
        }
        .tooltip-content.pinned .pin-close {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--accent-blue);
            color: var(--text);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            z-index: 2;
        }
        .tooltip-content.pinned .pin-close:hover {
            background: var(--accent-blue);
            color: #fff;
        }
        .tooltips-visible .tooltip-content {
            cursor: grab;
            user-select: none;
            pointer-events: auto;
        }
        .tooltips-visible .tooltip-content:active,
        .tooltips-visible .tooltip-content.dragging {
            cursor: grabbing;
        }
        /* v0.7: Checkbox toggle styling */
        .toggle-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .toggle-checkbox:hover { border-color: var(--accent-blue); color: var(--text); }
        .toggle-checkbox.active { border-color: var(--accent-blue); background: var(--accent-blue-dim); color: var(--accent-blue); }
        .toggle-checkbox input[type="checkbox"] {
            accent-color: var(--accent-blue);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        /* Lane drag handle */
        .drag-handle { cursor: grab; opacity: 0.4; transition: opacity 0.15s; }
        .drag-handle:hover { opacity: 1; }
        .drag-handle:active { cursor: grabbing; }

        /* Activity bar - v0.10: gradient, better rounded corners */
        .activity-bar {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 6px;
            border-radius: 3px;
            opacity: 0.55;
            transition: opacity 0.2s, height 0.2s;
        }
        .lane-row:hover .activity-bar { height: 8px; opacity: 0.8; }

        /* Event marker - v0.10: shadow for contrast, smoother hover */
        .event-marker {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            flex-shrink: 0;
            box-shadow: var(--shadow-marker);
        }
        .event-marker:hover { transform: scale(1.6); box-shadow: var(--shadow-marker), 0 0 0 4px color-mix(in srgb, currentColor 15%, transparent); }

        /* Milestone line */
        .milestone-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: repeating-linear-gradient(
                to bottom,
                var(--border-strong) 0px,
                var(--border-strong) 4px,
                transparent 4px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
        }

        .milestone-tag {
            position: absolute;
            top: 4px;
            transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 3;
        }

        .today-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--accent-blue);
            opacity: 0.6;
            pointer-events: none;
            z-index: 3;
        }
        .today-line::before {
            content: "Aujourd'hui";
            position: absolute;
            top: 4px;
            left: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--accent-blue);
            background: var(--bg);
            padding: 1px 4px;
            border-radius: 2px;
            white-space: nowrap;
        }

        /* Date axis - v0.10: cleaner look */
        .date-tick {
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 14px;
            background: var(--text-muted);
            opacity: 0.5;
            transform: translateX(-50%);
        }
        .date-label-axis {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            transform: translateX(-50%);
            bottom: 16px;
            white-space: nowrap;
            opacity: 0.8;
        }
        .date-tick.major {
            height: 18px;
            opacity: 0.7;
            width: 1.5px;
        }
        .date-label-axis.major {
            font-weight: 600;
            opacity: 1;
        }
        .date-tick.year-boundary {
            height: 24px;
            opacity: 0.85;
            background: var(--text);
            width: 2px;
        }

        /* Detail card - v0.5: match mockup styling */
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            border-top: 3px solid;
            transition: border-color 0.2s;
        }
        .detail-card:hover {
            border-color: rgba(255,255,255,0.15);
        }

        /* Lane label */
        .lane-attribution-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            display: inline-block;
            width: fit-content;
        }

        /* Responsive track area - v0.10: compact height, smooth transitions */
        .lane-track {
            flex: 1;
            position: relative;
            min-height: 48px;
            overflow: visible;
            transition: min-height 0.3s ease;
        }

        /* Remove operation button */
        .btn-remove {
            opacity: 0;
            transition: opacity 0.15s;
        }
        .lane-row:hover .btn-remove { opacity: 1; }

        /* v0.2: Editable header fields */
        .editable-field {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            color: inherit;
            font-family: inherit;
            padding: 2px 6px;
            margin: -2px -6px;
            transition: border-color 0.15s, background 0.15s;
            width: 100%;
        }
        .editable-field:hover { border-color: var(--border); }
        .editable-field:focus { border-color: var(--accent-blue); background: var(--surface); outline: none; }

        /* v0.2: Milestone editor panel */
        .milestone-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .milestone-form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .milestone-form label {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }
        .milestone-form input, .milestone-form select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            padding: 6px 10px;
        }
        .milestone-form input:focus, .milestone-form select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .milestone-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(46, 55, 64, 0.5);
            font-size: 12px;
        }
        .milestone-row:last-child { border-bottom: none; }
        .milestone-color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .milestone-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            transition: color 0.15s;
        }
        .milestone-remove:hover { color: #E5484D; }

        /* v0.2: Toolbar buttons */
        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .toolbar-btn:hover { border-color: var(--accent-blue); color: var(--text); }
        .toolbar-btn.active { border-color: var(--accent-blue); background: var(--accent-blue-dim); color: var(--accent-blue); }

        /* v0.2: Color picker inline */
        .color-pick {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 2px solid var(--border);
            cursor: pointer;
            padding: 0;
            transition: border-color 0.15s;
        }
        .color-pick:hover { border-color: var(--text-muted); }
        .color-pick.selected { border-color: var(--text); }

        body.export-active [data-export-hide] { display: none !important; }
        body.export-active .btn-remove { display: none !important; }
        body.export-active .drag-handle { display: none !important; }
        body.export-active .tooltip-content {
            -webkit-backdrop-filter: none !important;
            backdrop-filter: none !important;
        }
        body.export-active .tooltip-content.pinned {
            animation: none !important;
        }
        body.export-active .lane-row {
            animation: none !important;
            transform: none !important;
        }

        /* v0.2: Export overlay */
        .export-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 12px;
            color: var(--text);
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.25s ease-out both;
        }

        /* v0.15 F7: Toast de confirmation avec boutons d'action */
        .confirm-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 12px;
            color: var(--text);
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.25s ease-out both;
            max-width: 380px;
        }
        .confirm-toast-msg {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .confirm-toast-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .confirm-toast-btn {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
        }
        .confirm-toast-btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }
        .confirm-toast-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }
        .confirm-toast-btn.primary:hover {
            opacity: 0.85;
        }

        /* v0.2: Badge editable */
        .badge-editable {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 14px;
            cursor: text;
        }
        .badge-editable input {
            background: transparent;
            border: none;
            color: inherit;
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            width: 100%;
            min-width: 300px;
            outline: none;
        }

        /* v0.3: Drag & drop lane reorder - v0.10: hover highlight */
        .lane-row { transition: background 0.15s, opacity 0.15s; }
        .lane-row:hover { background: rgba(255,255,255,0.015); }
        .lane-row.drag-over-above { box-shadow: inset 0 3px 0 0 var(--accent-blue); }
        .lane-row.drag-over-below { box-shadow: inset 0 -3px 0 0 var(--accent-blue); }
        .lane-row.dragging { opacity: 0.35; }

        /* v0.3: Git fetch panel */
        .git-fetch-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
        }
        .git-fetch-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .git-fetch-row input[type="text"] {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 7px 12px;
        }
        .git-fetch-row input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .git-fetch-row input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* v0.3: Loading spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        /* v0.4: Filter bar */
        .filter-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-group-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .filter-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            padding: 5px 8px;
            min-width: 120px;
            cursor: pointer;
        }

    else if (totalDays <= 120) interval = 14;

        var daysUntilMon = (8 - day) % 7;
        current.setDate(current.getDate() + daysUntilMon);
    } else if (interval >= 14) {
        current.setDate(1);
        if (current < timeRange.start) {
            current.setDate(15);
            if (current < timeRange.start) {
                current.setMonth(current.getMonth() + 1);
                current.setDate(1);
            }
        }
    }
    var safety = 0;
    while (current <= timeRange.end && safety < 200) {
        ticks.push(new Date(current));
        if (interval >= 30) {
            current = new Date(current);
            current.setMonth(current.getMonth() + (interval >= 60 ? 2 : 1));
        } else {

    if (existingTimes.indexOf(startTime) < 0) ticks.unshift(new Date(startTime));
    if (existingTimes.indexOf(endTime) < 0) ticks.push(new Date(endTime));
    return ticks;
