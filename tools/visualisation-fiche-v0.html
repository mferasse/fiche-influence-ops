<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src https://raw.githubusercontent.com https://gitlab.com; object-src 'none'; base-uri 'none'; form-action 'none';">
    <title>visualisation Fiche - v0</title>

    <link rel="stylesheet" href="fonts/local.css">

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #0F1419;
            --surface: #1A2028;
            --surface2: #232A33;
            --border: #2A323D;
            --border-strong: #3B4452;
            --text: #F4F5F7;
            --text-muted: #8B93A0;
            --accent-blue: #6A6AF4;
            --accent-blue-bright: #8D8DF7;
            --accent-blue-dim: rgba(106, 106, 244, 0.14);
            --oxblood: #E05048;
            --ochre: #F59E0B;
            --moss: #EAB308;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* Subtle grid background */
        .grid-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.1;
            pointer-events: none;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

        /* Animation keyframes */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(106,106,244,0.3); } 50% { box-shadow: 0 0 0 8px rgba(106,106,244,0); } }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out both; }

        /* Drop zone visual */
        .drop-active { border-color: var(--accent-blue) !important; background: var(--accent-blue-dim) !important; }

        /* Tooltip positioning - v0.10: improved positioning, caret arrow, anti-overflow */
        .tooltip-wrapper { position: relative; z-index: 5; }
        .tooltip-content {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
            line-height: 1.5;
            white-space: nowrap;
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.18s, visibility 0.18s;
            max-width: 280px;
        }
        /* v0.10: caret arrow pointing to marker */
        .tooltip-content::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 8px;
            height: 8px;
            background: var(--surface2);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .tooltip-content.flipped {
            bottom: auto;
            top: calc(100% + 10px);
        }
        .tooltip-content.flipped::after {
            bottom: auto;
            top: -5px;
            border-right: none;
            border-bottom: none;
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
        }
        /* v0.10: anti-overflow left/right */
        .tooltip-content.align-left {
            left: 0;
            transform: translateX(0);
        }
        .tooltip-content.align-left::after {
            left: 12px;
            transform: rotate(45deg);
        }
        .tooltip-content.align-right {
            left: auto;
            right: 0;
            transform: translateX(0);
        }
        .tooltip-content.align-right::after {
            left: auto;
            right: 12px;
            transform: rotate(45deg);
        }

        /* v0.12: Tooltip stem connector line for offset tiers */
        .tooltip-stem {
            position: absolute;
            left: 50%;
            width: 1px;
            background: var(--border);
            opacity: 0.5;
            transform: translateX(-50%);
            pointer-events: none;
        }
        .tooltip-stem.stem-up {
            bottom: calc(100% + 6px);
        }
        .tooltip-stem.stem-down {
            top: calc(100% + 6px);
        }

        /* v0.12: Compact tooltip for dense clusters */
        .tooltip-content.compact-tooltip {
            max-width: 200px;
            padding: 7px 10px;
            font-size: 10px;
        }
        .tooltip-content.compact-tooltip .mono {
            font-size: 9px;
        }
        .tooltip-wrapper:hover .tooltip-content { visibility: visible; opacity: 1; }
        .tooltip-wrapper:hover { z-index: 20; }

        /* v0.7: Always-visible tooltips mode */
        .tooltips-visible .tooltip-content { visibility: visible; opacity: 1; }
        .tooltips-visible .tooltip-wrapper { z-index: 5; }
        .tooltips-visible .tooltip-wrapper:hover { z-index: 20; }

        /* v3: Pinned/draggable tooltips */
        .tooltip-content.pinned {
            box-shadow: 0 0 0 1px var(--accent-blue), 0 4px 20px rgba(0,0,0,0.6);
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 15;
        }
        .tooltip-content.pinned::after { display: none; }
        .tooltip-content.pinned .pin-close {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--accent-blue);
            color: var(--text);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            z-index: 2;
        }
        .tooltip-content.pinned .pin-close:hover {
            background: var(--accent-blue);
            color: #fff;
        }
        .tooltips-visible .tooltip-content {
            cursor: grab;
            user-select: none;
            pointer-events: auto;
        }
        .tooltips-visible .tooltip-content:active,
        .tooltips-visible .tooltip-content.dragging {
            cursor: grabbing;
        }
        .lane-stems {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            overflow: visible;
        }
        .lane-stems line {
            stroke: var(--border-strong);
            stroke-width: 1;
            stroke-dasharray: 3 3;
            opacity: 0.7;
        }
        .lane-stems line.active {
            stroke: var(--accent-blue);
            opacity: 0.9;
        }

        /* v0.7: Checkbox toggle styling */
        .toggle-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .toggle-checkbox:hover { border-color: var(--accent-blue); color: var(--text); }
        .toggle-checkbox.active { border-color: var(--accent-blue); background: var(--accent-blue-dim); color: var(--accent-blue); }
        .toggle-checkbox input[type="checkbox"] {
            accent-color: var(--accent-blue);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        /* Lane drag handle */
        .drag-handle { cursor: grab; opacity: 0.4; transition: opacity 0.15s; }
        .drag-handle:hover { opacity: 1; }
        .drag-handle:active { cursor: grabbing; }

        /* Activity bar - v0.10: gradient, better rounded corners */
        .activity-bar {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 8px;
            border-radius: 4px;
            opacity: 0.6;
            transition: opacity 0.2s, height 0.2s;
        }
        .lane-row:hover .activity-bar { height: 10px; opacity: 0.85; }

        /* Event marker - v0.10: shadow for contrast, smoother hover */
        .event-marker {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: default;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
        .event-marker:hover { transform: scale(1.6); box-shadow: 0 2px 8px rgba(0,0,0,0.6); }

        /* Milestone line */
        .milestone-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.2) 0px,
                rgba(255,255,255,0.2) 4px,
                transparent 4px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 2;
        }

        .milestone-tag {
            position: absolute;
            top: -24px;
            transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 3;
        }

        /* Date axis - v0.10: cleaner look */
        .date-tick {
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 10px;
            background: var(--text-muted);
            opacity: 0.3;
            transform: translateX(-50%);
        }
        .date-label-axis {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            transform: translateX(-50%);
            bottom: 16px;
            white-space: nowrap;
            opacity: 0.8;
        }

        /* Detail card - v0.5: match mockup styling */
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            border-top: 3px solid;
            transition: border-color 0.2s;
        }
        .detail-card:hover {
            border-color: rgba(255,255,255,0.15);
        }

        /* Lane label */
        .lane-attribution-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            display: inline-block;
            width: fit-content;
        }

        /* Responsive track area - v0.10: compact height, smooth transitions */
        .lane-track {
            flex: 1;
            position: relative;
            min-height: 48px;
            overflow: visible;
            transition: min-height 0.3s ease;
        }

        /* Remove operation button */
        .btn-remove {
            opacity: 0;
            transition: opacity 0.15s;
        }
        .lane-row:hover .btn-remove { opacity: 1; }

        /* v0.2: Editable header fields */
        .editable-field {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            color: inherit;
            font-family: inherit;
            padding: 2px 6px;
            margin: -2px -6px;
            transition: border-color 0.15s, background 0.15s;
            width: 100%;
        }
        .editable-field:hover { border-color: var(--border); }
        .editable-field:focus { border-color: var(--accent-blue); background: var(--surface); outline: none; }

        /* v0.2: Milestone editor panel */
        .milestone-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .milestone-form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .milestone-form label {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }
        .milestone-form input, .milestone-form select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            padding: 6px 10px;
        }
        .milestone-form input:focus, .milestone-form select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .milestone-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(46, 55, 64, 0.5);
            font-size: 12px;
        }
        .milestone-row:last-child { border-bottom: none; }
        .milestone-color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .milestone-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            transition: color 0.15s;
        }
        .milestone-remove:hover { color: #E5484D; }

        /* v0.2: Toolbar buttons */
        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .toolbar-btn:hover { border-color: var(--accent-blue); color: var(--text); }
        .toolbar-btn.active { border-color: var(--accent-blue); background: var(--accent-blue-dim); color: var(--accent-blue); }

        /* v0.2: Color picker inline */
        .color-pick {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 2px solid var(--border);
            cursor: pointer;
            padding: 0;
            transition: border-color 0.15s;
        }
        .color-pick:hover { border-color: var(--text-muted); }
        .color-pick.selected { border-color: var(--text); }

        /* v0.2: Export overlay */
        .export-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 12px;
            color: var(--text);
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.25s ease-out both;
        }

        /* v0.15 F7: Toast de confirmation avec boutons d'action */
        .confirm-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 12px;
            color: var(--text);
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.25s ease-out both;
            max-width: 380px;
        }
        .confirm-toast-msg {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .confirm-toast-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .confirm-toast-btn {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
        }
        .confirm-toast-btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }
        .confirm-toast-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }
        .confirm-toast-btn.primary:hover {
            opacity: 0.85;
        }

        /* v0.2: Badge editable */
        .badge-editable {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 14px;
            cursor: text;
        }
        .badge-editable input {
            background: transparent;
            border: none;
            color: inherit;
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            width: 100%;
            min-width: 300px;
            outline: none;
        }

        /* v0.3: Drag & drop lane reorder - v0.10: hover highlight */
        .lane-row { transition: background 0.15s, opacity 0.15s; }
        .lane-row:hover { background: rgba(255,255,255,0.015); }
        .lane-row.drag-over-above { box-shadow: inset 0 3px 0 0 var(--accent-blue); }
        .lane-row.drag-over-below { box-shadow: inset 0 -3px 0 0 var(--accent-blue); }
        .lane-row.dragging { opacity: 0.35; }

        /* v0.3: Git fetch panel */
        .git-fetch-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
        }
        .git-fetch-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .git-fetch-row input[type="text"] {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 7px 12px;
        }
        .git-fetch-row input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .git-fetch-row input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* v0.3: Loading spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        /* v0.4: Filter bar */
        .filter-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-group-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .filter-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            padding: 5px 8px;
            min-width: 120px;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--accent-blue); }
        .filter-select option { background: var(--surface2); color: var(--text); }

        .filter-search {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            padding: 5px 10px 5px 28px;
            min-width: 180px;
        }
        .filter-search:focus { outline: none; border-color: var(--accent-blue); }
        .filter-search::placeholder { color: var(--text-muted); opacity: 0.5; }
        .filter-search-wrapper {
            position: relative;
        }
        .filter-search-icon {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* v0.4: Active filter chips */
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 12px;
            padding: 2px 8px 2px 10px;
        }
        .filter-chip button {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            opacity: 0.7;
        }
        .filter-chip button:hover { opacity: 1; }

        /* v0.4: Counter badge */
        .filter-counter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            padding: 4px 10px;
            background: var(--surface2);
            border-radius: 12px;
            white-space: nowrap;
        }

        /* v0.4: Zoom controls */
        .zoom-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .zoom-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 4px 8px;
            width: 120px;
        }
        .zoom-input:focus { outline: none; border-color: var(--accent-blue); }
        .zoom-reset {
            font-size: 10px;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: color 0.15s;
        }
        .zoom-reset:hover { color: var(--text); border-color: var(--text-muted); }

        /* v0.4: Lane hidden by filter */
        .lane-row.filtered-out {
            display: none !important;
        }

        /* v0.11: Campaign modal pop-out */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
